- name: check the number less than 10 or not
  hosts: web
  vars_prompt:
    name: my_number
    prompt: please enter the number
    private: false
  tasks:
  - name: Print the number if it is less than 10
    ansible.builtin.debug:
      msg: "Give number {{my_number}} is less than 10"
    when: my_number | int < 10  

  - name: Print the number if it is given greater than 10
    ansible.builtin.debug:
      msg: "Give number {{my_number}} is greater than 10"
    when: my_number | int >= 10  