- name: create a user
  hosts: web
  become: yes
  tasks:
  - name: check user
    ansible.builtin.command: id doctor
    register: USER
    ignore_errors: true
  
  - name: print the info
    andible.builtin.debug:
      msg: "user info {{USER}}"

